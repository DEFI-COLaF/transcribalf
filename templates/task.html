{% extends "base.html" %}
{% block content %}

<div class="row">

    <!-- =========================
         IMAGE (ZOOM ENABLED)
    ========================== -->
    <div class="col-md-6">

        <h4>Transcription task — Chunk {{t.id}}</h4>

        <div style="overflow:auto; max-height:85vh; border:1px solid #ddd; background:white;">
            <img id="zoomImg"
                 src="{{ url_for('static', filename=t.image) }}"
                 style="width:100%; transition: transform 0.2s;">
        </div>

    </div>

    <!-- =========================
         INPUT PANEL
    ========================== -->
    <div class="col-md-6">

        <h5>Transcription</h5>

        <table class="table table-sm" id="annTable">
            <thead>
                <tr>
                    <th>Survey ID</th>
                    <th>Word form</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>
                {% if annotations %}
                    {% for a in annotations %}
                <tr>
                    <td><input class="form-control" name="survey" inputmode="numeric" pattern="[0-9]*" value="{{ a['survey_id'] }}"></td>
                    <td><input class="form-control" name="word" value="{{ a['word_form'] }}"></td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="removeRow(this)">X</button>
                    </td>
                </tr>
                    {% endfor %}
                {% else %}
                <tr>
                    <td><input class="form-control" name="survey" inputmode="numeric" pattern="[0-9]*"></td>
                    <td><input class="form-control" name="word"></td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="removeRow(this)">X</button>
                    </td>
                </tr>
                {% endif %}
            </tbody>
        </table>

        <button class="btn btn-secondary btn-sm" onclick="addRow()">+ Add row</button>

        <button id="submitBtn" class="btn btn-success w-100 mt-3" onclick="submitAll()">
            Submit transcription
        </button>

        <button id="noImageBtn" class="btn btn-outline-warning w-100 mt-2" onclick="markNoWordsOnImage()">
            No words on the image
        </button>

        <button id="previousBtn" class="btn btn-outline-primary w-100 mt-2" onclick="previousChunk()">
            Previous chunk
        </button>

        <button id="nextBtn" class="btn btn-primary w-100 mt-2" onclick="nextChunk()">
            Next chunk
        </button>

        <hr>

        <!-- =========================
             ALF KEYBOARD
        ========================== -->

        <style>
            .alf-keyboard {
                background: #fff;
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 12px;
            }

            .alf-keyboard-toolbar {
                display: grid;
                gap: 8px;
                grid-template-columns: 1fr auto;
            }

            .alf-keyboard-group {
                margin-top: 12px;
            }

            .alf-keyboard-title {
                color: #555;
                font-size: 0.85rem;
                font-weight: 700;
                margin-bottom: 6px;
                text-transform: uppercase;
            }

            .alf-keyboard-keys {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }

            .alf-key {
                min-width: 42px;
                min-height: 38px;
                font-size: 1.15rem;
                line-height: 1;
            }

            .alf-custom-tools {
                display: grid;
                gap: 8px;
                grid-template-columns: 1fr auto auto;
                margin-top: 12px;
            }

            .alf-request-tools {
                display: grid;
                gap: 8px;
                grid-template-columns: 90px 1fr auto;
                margin-top: 8px;
            }

            .alf-status {
                color: #666;
                font-size: 0.85rem;
                min-height: 1.2rem;
            }
        </style>

        <h5>ALF Keyboard</h5>
        <div class="alf-keyboard">
            <div class="alf-keyboard-toolbar">
                <input id="keyboardSearch"
                       class="form-control form-control-sm"
                       placeholder="Search a sign, e.g. a, r, nasal, breve">
                <button class="btn btn-outline-secondary btn-sm" type="button" onclick="clearKeyboardSearch()">
                    Clear
                </button>
            </div>

            <div id="keyboard"></div>

            <div class="alf-custom-tools">
                <input id="customCharacter"
                       class="form-control form-control-sm"
                       placeholder="Add a sign to my keyboard">
                <button class="btn btn-outline-dark btn-sm" type="button" onclick="addCustomCharacter()">
                    Add
                </button>
                <button class="btn btn-outline-danger btn-sm" type="button" onclick="clearCustomCharacters()">
                    Reset mine
                </button>
            </div>

            <div class="alf-request-tools">
                <input id="requestCharacter"
                       class="form-control form-control-sm"
                       placeholder="Sign">
                <input id="requestNote"
                       class="form-control form-control-sm"
                       placeholder="Ask for a shared keyboard addition, optional note">
                <button class="btn btn-outline-primary btn-sm" type="button" onclick="requestKeyboardCharacter()">
                    Ask
                </button>
            </div>

            <div id="keyboardStatus" class="alf-status mt-2"></div>
        </div>

    </div>
</div>

<!-- =========================
     ZOOM LOGIC
========================== -->
<script>
let scale = 1;
const img = document.getElementById("zoomImg");

img.addEventListener("wheel", function(e) {
    e.preventDefault();

    if (e.deltaY < 0) {
        scale += 0.1;
    } else {
        scale = Math.max(1, scale - 0.1);
    }

    img.style.transform = `scale(${scale})`;
});
</script>

<!-- =========================
     KEYBOARD LOGIC
========================== -->
<script>

const keyboardGroups = [
    {
        label: "Consonants",
        items: [
            ["ꞓ", "open c consonant"], ["c̑", "c circumflex"], ["ç̑", "cedilla c circumflex"],
            ["ḓ", "d with circumflex below"], ["l̮", "l below"], ["l̮̣", "l below dot"],
            ["ṃ", "m dot below"], ["n̮", "n below"], ["ṅ", "n dot above"],
            ["r̃", "r tilde"], ["ȓ", "r inverted breve"], ["ṙ", "r dot above"],
            ["ṛ", "r dot below"], ["r̥", "r ring below"], ["ṣ", "s dot below"],
            ["t̯", "t inverted breve below"], ["ẅ", "w diaeresis"], ["ẓ", "z dot below"],
            ["r̄", "r macron"]
        ]
    },
    {
        label: "A and E vowels",
        items: [
            ["ā", "a macron"], ["ă", "a breve"], ["ā́", "a macron acute"],
            ["ā̀", "a macron grave"], ["ằ", "a breve grave"], ["ắ", "a breve acute"],
            ["ĕ", "e breve"], ["ē", "e macron"], ["ĕ̀", "e breve grave"],
            ["ĕ́", "e breve acute"], ["ḕ", "e macron grave"], ["ḗ", "e macron acute"],
            ["ė", "e dot above"], ["é̇", "e acute dot"], ["aͤ", "a superscript e"],
            ["aͤ̆", "a superscript e breve"], ["aͤ̀", "a superscript e grave"]
        ]
    },
    {
        label: "O, I, U vowels",
        items: [
            ["ō", "o macron"], ["ŏ", "o breve"], ["ŏ́", "o breve acute"],
            ["ŏ̀", "o breve grave"], ["ṓ", "o macron acute"], ["ṑ", "o macron grave"],
            ["ó", "o acute"], ["aͦ", "a superscript o"], ["aͦ̄", "a superscript o macron"],
            ["aͦ̀", "a superscript o grave"], ["ī", "i macron"], ["ĭ", "i breve"],
            ["ī́", "i macron acute"], ["ī̀", "i macron grave"], ["ĭ́", "i breve acute"],
            ["ĭ̀", "i breve grave"], ["ū", "u macron"], ["ŭ", "u breve"],
            ["ū́", "u macron acute"], ["ū̀", "u macron grave"], ["ŭ́", "u breve acute"],
            ["ŭ̀", "u breve grave"], ["eͥ", "e superscript i"], ["uͥ", "u superscript i"]
        ]
    },
    {
        label: "OE and vocalic signs",
        items: [
            ["œ̄", "oe macron"], ["œ̆", "oe breve"], ["œ̄́", "oe macron acute"],
            ["œ̄̀", "oe macron grave"], ["œ̆́", "oe breve acute"], ["œ̆̀", "oe breve grave"],
            ["ꭒ", "open oe"], ["ꭒ̀", "open oe grave"], ["ꭒ́", "open oe acute"],
            ["ꭒ̆", "open oe breve"], ["ꭒͦ", "open oe superscript o"], ["ṓ̩", "syllabic o acute"],
            ["ā̩́", "syllabic a macron acute"], ["ā̩̀", "syllabic a macron grave"],
            ["ằ̩", "syllabic a breve grave"], ["ĕ̩̀", "syllabic e breve grave"],
            ["ī̩́", "syllabic i macron acute"], ["ḕ̩", "syllabic e macron grave"],
            ["ḗ̩", "syllabic e macron acute"]
        ]
    }
];

const CUSTOM_KEY = "transcriptalf.customKeyboardCharacters";
const csrfToken = "{{ csrf_token() }}";

let lastFocusedInput = null;

document.addEventListener("focusin", e => {
    if (e.target.tagName === "INPUT" && !e.target.id.startsWith("keyboard") && !e.target.id.startsWith("custom") && !e.target.id.startsWith("request")) {
        lastFocusedInput = e.target;
    }
});

const kb = document.getElementById("keyboard");
const keyboardSearch = document.getElementById("keyboardSearch");
const keyboardStatus = document.getElementById("keyboardStatus");

keyboardSearch.addEventListener("input", renderKeyboard);

function getCustomCharacters() {
    try {
        return JSON.parse(localStorage.getItem(CUSTOM_KEY)) || [];
    } catch (e) {
        return [];
    }
}

function saveCustomCharacters(characters) {
    localStorage.setItem(CUSTOM_KEY, JSON.stringify(characters));
}

function insertCharacter(character) {
    if (!lastFocusedInput) {
        lastFocusedInput = document.querySelector("input[name='word']");
    }

    if (!lastFocusedInput) {
        return;
    }

    const start = lastFocusedInput.selectionStart ?? lastFocusedInput.value.length;
    const end = lastFocusedInput.selectionEnd ?? lastFocusedInput.value.length;
    lastFocusedInput.value = lastFocusedInput.value.slice(0, start) + character + lastFocusedInput.value.slice(end);
    lastFocusedInput.selectionStart = start + character.length;
    lastFocusedInput.selectionEnd = start + character.length;
    lastFocusedInput.focus();
}

function createKey(character, title) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "btn btn-outline-dark alf-key";
    btn.innerText = character;
    btn.title = title || character;
    btn.onclick = () => insertCharacter(character);
    return btn;
}

function renderGroup(label, items, query) {
    const filtered = items.filter(([character, title]) => {
        const text = `${character} ${title}`.toLowerCase();
        return !query || text.includes(query);
    });

    if (!filtered.length) {
        return;
    }

    const group = document.createElement("div");
    group.className = "alf-keyboard-group";

    const title = document.createElement("div");
    title.className = "alf-keyboard-title";
    title.innerText = label;
    group.appendChild(title);

    const keys = document.createElement("div");
    keys.className = "alf-keyboard-keys";

    filtered.forEach(([character, title]) => keys.appendChild(createKey(character, title)));

    group.appendChild(keys);
    kb.appendChild(group);
}

function renderKeyboard() {
    const query = keyboardSearch.value.trim().toLowerCase();
    kb.innerHTML = "";

    keyboardGroups.forEach(group => renderGroup(group.label, group.items, query));

    const customItems = getCustomCharacters().map(character => [character, "custom sign"]);
    renderGroup("My signs", customItems, query);

    if (!kb.children.length) {
        kb.innerHTML = "<p class=\"text-muted mb-0 mt-3\">No sign found. Add it below or ask for it to be added to the shared keyboard.</p>";
    }
}

function clearKeyboardSearch() {
    keyboardSearch.value = "";
    renderKeyboard();
}

function addCustomCharacter() {
    const input = document.getElementById("customCharacter");
    const character = input.value.trim();

    if (!character) {
        return;
    }

    const characters = getCustomCharacters();

    if (!characters.includes(character)) {
        characters.push(character);
        saveCustomCharacters(characters);
    }

    input.value = "";
    keyboardStatus.innerText = `${character} added to your keyboard on this browser.`;
    renderKeyboard();
}

function clearCustomCharacters() {
    localStorage.removeItem(CUSTOM_KEY);
    keyboardStatus.innerText = "Your custom signs were cleared on this browser.";
    renderKeyboard();
}

async function requestKeyboardCharacter() {
    const characterInput = document.getElementById("requestCharacter");
    const noteInput = document.getElementById("requestNote");
    const character = characterInput.value.trim();
    const note = noteInput.value.trim();

    if (!character) {
        keyboardStatus.innerText = "Add the missing sign before sending a request.";
        return;
    }

    const response = await fetch("{{ url_for('request_keyboard_character') }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({character, note})
    });

    if (response.ok) {
        characterInput.value = "";
        noteInput.value = "";
        keyboardStatus.innerText = "Request saved. An admin can review it for the shared keyboard.";
    } else {
        keyboardStatus.innerText = "The request could not be saved.";
    }
}

renderKeyboard();
</script>

<!-- =========================
     TABLE LOGIC
========================== -->
<script>

function addRow() {
    let table = document.querySelector("#annTable tbody");
    let row = table.rows[0].cloneNode(true);

    row.querySelectorAll("input").forEach(i => i.value = "");
    table.appendChild(row);
}

function removeRow(btn) {
    let row = btn.closest("tr");
    if (document.querySelectorAll("#annTable tbody tr").length > 1) {
        row.remove();
    }
}

function collectEntries({allowEmpty = false} = {}) {
    let rows = document.querySelectorAll("#annTable tbody tr");
    let entries = [];

    for (const r of rows) {
        let survey = r.querySelector("input[name='survey']").value.trim();
        let word = r.querySelector("input[name='word']").value.trim();

        if (!survey && !word) {
            continue;
        }

        if (!survey || !word) {
            return {
                error: "Each row needs both a survey number and a word."
            };
        }

        if (!/^\d+$/.test(survey)) {
            return {
                error: "Survey ID must contain digits only."
            };
        }

        entries.push({survey_id: survey, word: word});
    }

    if (!allowEmpty && !entries.length) {
        return {
            error: "Please add at least one complete row, or use the no words on the image button."
        };
    }

    return {entries};
}

async function submitAll() {
    const result = collectEntries();

    if (result.error) {
        alert(result.error);
        return;
    }

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;

    const response = await fetch("{{ url_for('add_many', cid=t.id) }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify(result.entries)
    });

    if (response.ok) {
        window.location = "{{ url_for('task') }}";
    } else {
        btn.disabled = false;
        alert("The transcription could not be saved.");
    }
}

async function nextChunk() {
    const result = collectEntries({allowEmpty: true});

    if (result.error) {
        alert(result.error);
        return;
    }

    if (result.entries.length) {
        alert("Submit the transcription before moving to the next chunk.");
        return;
    }

    const btn = document.getElementById("nextBtn");
    btn.disabled = true;

    const response = await fetch("{{ url_for('add_many', cid=t.id) }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify([])
    });

    if (response.ok) {
        window.location = "{{ url_for('task') }}";
    } else {
        btn.disabled = false;
        alert("The chunk could not be skipped.");
    }
}

async function markNoWordsOnImage() {
    const result = collectEntries({allowEmpty: true});

    if (result.error) {
        alert(result.error);
        return;
    }

    if (result.entries.length) {
        alert("Remove the transcription rows before marking this image as having no words.");
        return;
    }

    const btn = document.getElementById("noImageBtn");
    btn.disabled = true;

    const response = await fetch("{{ url_for('mark_no_image', cid=t.id) }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({})
    });

    if (response.ok) {
        window.location = "{{ url_for('task') }}";
    } else {
        btn.disabled = false;
        alert("The chunk could not be marked as having no words.");
    }
}

async function previousChunk() {
    const result = collectEntries({allowEmpty: true});

    if (result.error) {
        alert(result.error);
        return;
    }

    if (result.entries.length) {
        alert("Submit the transcription before moving to the previous chunk.");
        return;
    }

    const btn = document.getElementById("previousBtn");
    btn.disabled = true;

    const response = await fetch("{{ url_for('previous_task', cid=t.id) }}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify({})
    });

    if (response.ok) {
        window.location = "{{ url_for('task') }}";
    } else {
        btn.disabled = false;
        alert("No previous chunk is available.");
    }
}

</script>

{% endblock %}
